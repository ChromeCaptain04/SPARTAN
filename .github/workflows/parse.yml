name: Parse Spartan Logs

on:
  push:
    paths:
      # This '**' wildcard ensures it triggers for files in the root OR subfolders like /run/ or /strength/
      - 'logs/raw/**/*.txt'
      - 'scripts/parse_workout.py'
  workflow_dispatch:
    inputs:
      force_reprocess:
        description: 'Reprocess ALL raw files (overwrites existing JSON)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  parse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Parse logs
        run: |
          if [ "${{ github.event.inputs.force_reprocess }}" = "true" ]; then
            echo "Force reprocessing all archives..."
            python scripts/parse_workout.py --force
          else
            python scripts/parse_workout.py
          fi

      - name: Commit parsed JSON
        run: |
          git config user.name "spartan-bot"
          git config user.email "bot@spartan.local"
          # Adding the folder recursively ensures it catches the new /run/ and /strength/ subfolders
          git add logs/json/
          git diff --staged --quiet || git commit -m "auto: parse spartan logs"
          git push